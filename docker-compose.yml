version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ludo-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ludo
      MYSQL_USER: ludo_user
      MYSQL_PASSWORD: ludopassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    container_name: ludo-backend
    ports:
      - "8080:8080"
    environment:
      - DB_DSN=ludo_user:ludopassword@tcp(db:3306)/ludo?parseTime=true
      - JWT_SECRET=supersecretjwtkey
      - PORT=8080
    depends_on:
      - db

volumes:
  db_data:
